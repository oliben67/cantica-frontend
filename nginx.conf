server {
    listen 80;
    server_name _;

    # Use Docker's embedded DNS so upstream resolution is deferred to
    # request time, not nginx startup (avoids "host not found" crashes).
    resolver 127.0.0.11 valid=30s;
    set $api http://api:8042;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service
    location /v1/ {
        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # SPA fallback — return index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
